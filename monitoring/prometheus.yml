global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion
    static_configs:
      - targets: ['ingestion:8000']
    metrics_path: /metrics

  - job_name: prediction
    static_configs:
      - targets: ['prediction:8001']
    metrics_path: /metrics

  - job_name: rag
    static_configs:
      - targets: ['rag:8002']
    metrics_path: /metrics

  - job_name: llm
    static_configs:
      - targets: ['llm:8003']
    metrics_path: /metrics
